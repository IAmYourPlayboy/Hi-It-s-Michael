<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 220" role="img" aria-labelledby="title desc">
  <title id="title">Open Source Pulse achievement badge</title>
  <desc id="desc">A glossy 3D achievement badge with activity rings and a branching open-source icon.</desc>
  <defs>
    <filter id="softShadow" x="-30%" y="-25%" width="160%" height="170%">
      <feDropShadow dx="0" dy="18" stdDeviation="12" flood-color="#081018" flood-opacity=".45"/>
      <feDropShadow dx="0" dy="3" stdDeviation="2" flood-color="#ffffff" flood-opacity=".17"/>
    </filter>
    <filter id="innerGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <linearGradient id="body" x1="24" x2="160" y1="16" y2="202" gradientUnits="userSpaceOnUse">
      <stop stop-color="#365054"/>
      <stop offset=".38" stop-color="#112022"/>
      <stop offset="1" stop-color="#04090b"/>
    </linearGradient>
    <radialGradient id="face" cx="39%" cy="26%" r="75%">
      <stop stop-color="#4e7073"/>
      <stop offset=".5" stop-color="#132326"/>
      <stop offset="1" stop-color="#04090b"/>
    </radialGradient>
    <linearGradient id="shine" x1="45" x2="138" y1="18" y2="118" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity=".58"/>
      <stop offset=".35" stop-color="#ffffff" stop-opacity=".15"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ringA" x1="44" x2="138" y1="31" y2="130" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1bffb2"/>
      <stop offset=".46" stop-color="#00d9ff"/>
      <stop offset="1" stop-color="#7276ff"/>
    </linearGradient>
    <linearGradient id="ringB" x1="46" x2="134" y1="130" y2="40" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fff05f"/>
      <stop offset=".52" stop-color="#ff7a59"/>
      <stop offset="1" stop-color="#ff4fd8"/>
    </linearGradient>
    <linearGradient id="ringC" x1="56" x2="128" y1="44" y2="116" gradientUnits="userSpaceOnUse">
      <stop stop-color="#98ff6b"/>
      <stop offset=".47" stop-color="#34ff9f"/>
      <stop offset="1" stop-color="#00d9ff"/>
    </linearGradient>
  </defs>
  <rect x="20" y="8" width="140" height="192" rx="36" fill="url(#body)" filter="url(#softShadow)"/>
  <ellipse cx="90" cy="188" rx="47" ry="12" fill="#000" opacity=".34"/>
  <circle cx="90" cy="86" r="60" fill="url(#face)"/>
  <circle cx="90" cy="86" r="57" fill="none" stroke="#ffffff" stroke-opacity=".13" stroke-width="1.5"/>
  <circle cx="90" cy="86" r="48" fill="none" stroke="url(#ringA)" stroke-width="10" stroke-linecap="round" stroke-dasharray="286 302" transform="rotate(-90 90 86)" filter="url(#innerGlow)"/>
  <circle cx="90" cy="86" r="35" fill="none" stroke="url(#ringB)" stroke-width="9" stroke-linecap="round" stroke-dasharray="154 220" transform="rotate(-90 90 86)" filter="url(#innerGlow)"/>
  <circle cx="90" cy="86" r="23" fill="none" stroke="url(#ringC)" stroke-width="8" stroke-linecap="round" stroke-dasharray="132 145" transform="rotate(-90 90 86)" filter="url(#innerGlow)"/>
  <path d="M56 49c15-26 56-32 82-7 5 5 1 13-6 11-25-8-49-3-71 12-8 5-12-8-5-16z" fill="url(#shine)" opacity=".76"/>
  <path d="M78 96V78c0-9 7-16 16-16s16 7 16 16v18" fill="none" stroke="#eafff7" stroke-width="7" stroke-linecap="round"/>
  <path d="M78 88c-10 0-18 8-18 18M110 88c10 0 18 8 18 18" fill="none" stroke="#69ffd2" stroke-width="5" stroke-linecap="round"/>
  <circle cx="78" cy="96" r="7" fill="#00d9ff" stroke="#06252d" stroke-width="3"/>
  <circle cx="110" cy="96" r="7" fill="#ffdc5c" stroke="#2b2107" stroke-width="3"/>
  <circle cx="94" cy="66" r="7" fill="#ff5fbf" stroke="#2b0820" stroke-width="3"/>
  <text x="90" y="158" fill="#f7fffb" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800" text-anchor="middle" letter-spacing="0">OSS Pulse</text>
  <text x="90" y="178" fill="#9abcc0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" text-anchor="middle" letter-spacing="0">MERGED ENERGY</text>
  <path d="M44 197h92" stroke="#ffffff" stroke-opacity=".08" stroke-width="1"/>
</svg>
