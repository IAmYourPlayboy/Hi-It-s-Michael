<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 220" role="img" aria-labelledby="title desc">
  <title id="title">Flow State achievement badge</title>
  <desc id="desc">A glossy 3D achievement badge with neon fitness-style rings and a terminal prompt icon.</desc>
  <defs>
    <filter id="softShadow" x="-30%" y="-25%" width="160%" height="170%">
      <feDropShadow dx="0" dy="18" stdDeviation="12" flood-color="#051016" flood-opacity=".45"/>
      <feDropShadow dx="0" dy="3" stdDeviation="2" flood-color="#ffffff" flood-opacity=".18"/>
    </filter>
    <filter id="innerGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <linearGradient id="body" x1="22" x2="160" y1="16" y2="200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3b4650"/>
      <stop offset=".36" stop-color="#141a21"/>
      <stop offset="1" stop-color="#05070a"/>
    </linearGradient>
    <radialGradient id="face" cx="42%" cy="28%" r="72%">
      <stop stop-color="#526170"/>
      <stop offset=".5" stop-color="#171f29"/>
      <stop offset="1" stop-color="#05070a"/>
    </radialGradient>
    <linearGradient id="shine" x1="46" x2="136" y1="18" y2="118" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity=".58"/>
      <stop offset=".34" stop-color="#ffffff" stop-opacity=".16"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ringA" x1="40" x2="142" y1="28" y2="128" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00f0ff"/>
      <stop offset=".52" stop-color="#34ff9f"/>
      <stop offset="1" stop-color="#fbff5b"/>
    </linearGradient>
    <linearGradient id="ringB" x1="42" x2="136" y1="130" y2="42" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ff4fd8"/>
      <stop offset=".5" stop-color="#7c5cff"/>
      <stop offset="1" stop-color="#00d9ff"/>
    </linearGradient>
    <linearGradient id="ringC" x1="56" x2="126" y1="42" y2="118" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ff7a59"/>
      <stop offset=".48" stop-color="#ffd36b"/>
      <stop offset="1" stop-color="#5cffb1"/>
    </linearGradient>
  </defs>
  <rect x="20" y="8" width="140" height="192" rx="36" fill="url(#body)" filter="url(#softShadow)"/>
  <ellipse cx="90" cy="188" rx="47" ry="12" fill="#000" opacity=".32"/>
  <circle cx="90" cy="86" r="60" fill="url(#face)"/>
  <circle cx="90" cy="86" r="57" fill="none" stroke="#ffffff" stroke-opacity=".13" stroke-width="1.5"/>
  <circle cx="90" cy="86" r="48" fill="none" stroke="url(#ringA)" stroke-width="10" stroke-linecap="round" stroke-dasharray="255 302" transform="rotate(-90 90 86)" filter="url(#innerGlow)"/>
  <circle cx="90" cy="86" r="35" fill="none" stroke="url(#ringB)" stroke-width="9" stroke-linecap="round" stroke-dasharray="185 220" transform="rotate(-90 90 86)" filter="url(#innerGlow)"/>
  <circle cx="90" cy="86" r="23" fill="none" stroke="url(#ringC)" stroke-width="8" stroke-linecap="round" stroke-dasharray="124 145" transform="rotate(-90 90 86)" filter="url(#innerGlow)"/>
  <path d="M56 49c15-26 56-32 82-7 5 5 1 13-6 11-25-8-49-3-71 12-8 5-12-8-5-16z" fill="url(#shine)" opacity=".78"/>
  <rect x="63" y="75" width="54" height="30" rx="10" fill="#071116" stroke="#b6fff1" stroke-opacity=".28"/>
  <path d="m75 83 8 7-8 7" fill="none" stroke="#7dffd4" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M91 99h15" fill="none" stroke="#e8fff9" stroke-width="4" stroke-linecap="round"/>
  <text x="90" y="158" fill="#f7fbff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="800" text-anchor="middle" letter-spacing="0">Flow State</text>
  <text x="90" y="178" fill="#9eafbd" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" text-anchor="middle" letter-spacing="0">100 DAY CODE RING</text>
  <path d="M44 197h92" stroke="#ffffff" stroke-opacity=".08" stroke-width="1"/>
</svg>
