<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 220" role="img" aria-labelledby="title desc">
  <title id="title">Ship It achievement badge</title>
  <desc id="desc">A glossy 3D achievement badge with colorful progress rings and a rocket launch icon.</desc>
  <defs>
    <filter id="softShadow" x="-30%" y="-25%" width="160%" height="170%">
      <feDropShadow dx="0" dy="18" stdDeviation="12" flood-color="#17080c" flood-opacity=".46"/>
      <feDropShadow dx="0" dy="3" stdDeviation="2" flood-color="#ffffff" flood-opacity=".17"/>
    </filter>
    <filter id="innerGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <linearGradient id="body" x1="26" x2="162" y1="18" y2="198" gradientUnits="userSpaceOnUse">
      <stop stop-color="#56434d"/>
      <stop offset=".38" stop-color="#20141a"/>
      <stop offset="1" stop-color="#080509"/>
    </linearGradient>
    <radialGradient id="face" cx="38%" cy="26%" r="74%">
      <stop stop-color="#715866"/>
      <stop offset=".5" stop-color="#21151d"/>
      <stop offset="1" stop-color="#070407"/>
    </radialGradient>
    <linearGradient id="shine" x1="45" x2="138" y1="18" y2="118" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity=".55"/>
      <stop offset=".36" stop-color="#ffffff" stop-opacity=".15"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ringA" x1="42" x2="138" y1="34" y2="128" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ff396d"/>
      <stop offset=".5" stop-color="#ffb938"/>
      <stop offset="1" stop-color="#fff36a"/>
    </linearGradient>
    <linearGradient id="ringB" x1="48" x2="132" y1="130" y2="42" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7c5cff"/>
      <stop offset=".48" stop-color="#ff4fd8"/>
      <stop offset="1" stop-color="#ff725e"/>
    </linearGradient>
    <linearGradient id="ringC" x1="56" x2="128" y1="44" y2="116" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00e1ff"/>
      <stop offset=".52" stop-color="#55ffb0"/>
      <stop offset="1" stop-color="#fff06a"/>
    </linearGradient>
  </defs>
  <rect x="20" y="8" width="140" height="192" rx="36" fill="url(#body)" filter="url(#softShadow)"/>
  <ellipse cx="90" cy="188" rx="47" ry="12" fill="#000" opacity=".34"/>
  <circle cx="90" cy="86" r="60" fill="url(#face)"/>
  <circle cx="90" cy="86" r="57" fill="none" stroke="#ffffff" stroke-opacity=".13" stroke-width="1.5"/>
  <circle cx="90" cy="86" r="48" fill="none" stroke="url(#ringA)" stroke-width="10" stroke-linecap="round" stroke-dasharray="238 302" transform="rotate(-90 90 86)" filter="url(#innerGlow)"/>
  <circle cx="90" cy="86" r="35" fill="none" stroke="url(#ringB)" stroke-width="9" stroke-linecap="round" stroke-dasharray="165 220" transform="rotate(-90 90 86)" filter="url(#innerGlow)"/>
  <circle cx="90" cy="86" r="23" fill="none" stroke="url(#ringC)" stroke-width="8" stroke-linecap="round" stroke-dasharray="99 145" transform="rotate(-90 90 86)" filter="url(#innerGlow)"/>
  <path d="M56 49c15-26 56-32 82-7 5 5 1 13-6 11-25-8-49-3-71 12-8 5-12-8-5-16z" fill="url(#shine)" opacity=".75"/>
  <path d="M94 61c13 7 20 19 21 35l-13-1-9 15-8-15-13 1c2-16 9-28 22-35z" fill="#f8fbff" stroke="#ffccb5" stroke-opacity=".45" stroke-width="2"/>
  <circle cx="94" cy="78" r="6" fill="#21d8ff" stroke="#0a2934" stroke-width="2"/>
  <path d="M85 96c-5 5-8 11-9 19 8-2 14-5 19-10M103 96c5 5 8 11 9 19-8-2-14-5-19-10" fill="#ff5d7a"/>
  <path d="M89 108h10l-5 11z" fill="#ffd15c"/>
  <text x="90" y="158" fill="#fff9fb" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="800" text-anchor="middle" letter-spacing="0">Ship It</text>
  <text x="90" y="178" fill="#c2a7b4" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" text-anchor="middle" letter-spacing="0">RELEASE STREAK</text>
  <path d="M44 197h92" stroke="#ffffff" stroke-opacity=".08" stroke-width="1"/>
</svg>
